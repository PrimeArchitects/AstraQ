name: astrasphere

services:
  postgres:
    image: postgres:16-alpine
    container_name: astrasphere_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-astrasphere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-astrasphere}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-astrasphere} -d ${POSTGRES_DB:-astrasphere}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - astrasphere_net

  redis:
    image: redis:7-alpine
    container_name: astrasphere_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - astrasphere_net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: astrasphere_qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - astrasphere_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: astrasphere_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://astrasphere:change_me_dev_password@postgres:5432/astrasphere}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - astrasphere_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: astrasphere_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - astrasphere_net

networks:
  astrasphere_net:
    driver: bridge

volumes:
  pgdata:
  redis_data:
  qdrant_storage:
